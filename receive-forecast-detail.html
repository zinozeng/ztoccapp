<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>到件预报下钻</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .mobile-container {
            max-width: 414px;
            margin: 0 auto;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #333;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
        }

        .back-btn:active {
            opacity: 0.6;
        }

        .header-title {
            color: #333;
            font-size: 17px;
            font-weight: 600;
            flex: 1;
        }

        .filter-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .filter-btn {
            padding: 6px 12px;
            background: #f5f7fa;
            border: none;
            border-radius: 16px;
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #0066cc;
            color: #fff;
        }

        .main-content {
            padding: 16px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 6px;
        }

        .summary-value {
            font-size: 18px;
            font-weight: 600;
            color: #0066cc;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .data-table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .data-table th {
            background: #f5f7fa;
            padding: 10px 6px;
            text-align: left;
            color: #666;
            font-weight: 600;
            white-space: nowrap;
        }

        .data-table td {
            padding: 12px 6px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
            white-space: nowrap;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <div class="header-top">
                <button class="back-btn" onclick="history.back()">‹</button>
                <h1 class="header-title" id="pageTitle">到件预报</h1>
            </div>
        </header>

        <div class="filter-bar">
            <button class="filter-btn active">全部</button>
            <button class="filter-btn">零担</button>
            <button class="filter-btn">冷链快递</button>
            <button class="filter-btn">冷链小件</button>
            <button class="filter-btn">鲸确达</button>
        </div>

        <main class="main-content">
            <div class="card">
                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="summary-label">总票号</div>
                        <div class="summary-value" id="totalTickets">34</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">开单票数</div>
                        <div class="summary-value" id="orderTickets">34</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">件数</div>
                        <div class="summary-value" id="totalCount">110</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">体积</div>
                        <div class="summary-value" id="totalVolume">3.68</div>
                    </div>
                </div>

                <div class="section-title">明细列表</div>
                <div class="data-table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>运单号</th>
                                <th>托数</th>
                                <th>重量</th>
                                <th>体积 (m³)</th>
                                <th>产品名称</th>
                                <th>备注</th>
                                <th>操作时间</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td>ZTO202501232</td>
                                <td>1</td>
                                <td>35.5</td>
                                <td>0.12</td>
                                <td>零担</td>
                                <td>-</td>
                                <td>01-30 10:23</td>
                            </tr>
                            <tr>
                                <td>ZTO202501233</td>
                                <td>1</td>
                                <td>42.8</td>
                                <td>0.15</td>
                                <td>冷链快递</td>
                                <td>-</td>
                                <td>01-30 10:45</td>
                            </tr>
                            <tr>
                                <td>ZTO202501234</td>
                                <td>1</td>
                                <td>28.3</td>
                                <td>0.09</td>
                                <td>冷链小件</td>
                                <td>-</td>
                                <td>01-30 11:12</td>
                            </tr>
                            <tr>
                                <td>ZTO202501235</td>
                                <td>2</td>
                                <td>55.2</td>
                                <td>0.18</td>
                                <td>零担</td>
                                <td>-</td>
                                <td>01-30 11:38</td>
                            </tr>
                            <tr>
                                <td>ZTO202501236</td>
                                <td>1</td>
                                <td>31.6</td>
                                <td>0.11</td>
                                <td>鲸确达 - 零担</td>
                                <td>-</td>
                                <td>01-30 12:05</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');

        const config = {
            'normal': {
                title: '到件预报',
                tickets: '34',
                orderTickets: '34',
                count: '110',
                volume: '3.68'
            },
            'transit': {
                title: '已发中心未到（汽运）到件预报',
                tickets: '48',
                orderTickets: '48',
                count: '156',
                volume: '7.5229'
            }
        };

        const currentConfig = config[type] || config['normal'];

        document.getElementById('pageTitle').textContent = currentConfig.title;
        document.getElementById('totalTickets').textContent = currentConfig.tickets;
        document.getElementById('orderTickets').textContent = currentConfig.orderTickets;
        document.getElementById('totalCount').textContent = currentConfig.count;
        document.getElementById('totalVolume').textContent = currentConfig.volume;

        // 过滤按钮点击事件
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
