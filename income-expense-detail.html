<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>收支详情</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .mobile-container {
            max-width: 414px;
            margin: 0 auto;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #333;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
        }

        .back-btn:active {
            opacity: 0.6;
        }

        .header-title {
            color: #333;
            font-size: 17px;
            font-weight: 600;
            flex: 1;
        }

        .main-content {
            padding: 16px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        .summary-box {
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        .summary-box.income {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }

        .summary-box.expense {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
        }

        .summary-value {
            font-size: 32px;
            font-weight: 700;
        }

        .summary-box.income .summary-value {
            color: #2e7d32;
        }

        .summary-box.expense .summary-value {
            color: #c62828;
        }

        .summary-label {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        .trend-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }

        .trend-up {
            background: #ffe6e6;
            color: #ff4d4f;
        }

        .trend-down {
            background: #e6f7e6;
            color: #52c41a;
        }

        .chart-box {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .chart-container {
            position: relative;
            height: 180px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .data-item {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 14px;
        }

        .data-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 6px;
        }

        .data-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .data-table th {
            background: #f5f7fa;
            padding: 10px 6px;
            text-align: left;
            color: #666;
            font-weight: 600;
        }

        .data-table td {
            padding: 12px 6px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        .compose-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .compose-item:last-child {
            border-bottom: none;
        }

        .compose-label {
            font-size: 13px;
            color: #666;
        }

        .compose-value {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }

        @media (max-width: 375px) {
            .summary-value {
                font-size: 28px;
            }
            
            .chart-container {
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <div class="header-top">
                <button class="back-btn" onclick="history.back()">‹</button>
                <h1 class="header-title" id="pageTitle">本期收入详情</h1>
            </div>
        </header>

        <main class="main-content">
            <div class="card">
                <div class="summary-box income" id="summaryBox">
                    <div class="summary-value" id="mainValue">¥10,315.32</div>
                    <div class="summary-label" id="mainLabel">本期收入</div>
                    <span class="trend-badge trend-up" id="trendBadge">↑ 环比：+15%</span>
                </div>
            </div>

            <div class="card">
                <div class="section-title">收入构成</div>
                <div class="compose-item">
                    <span class="compose-label">中转收入</span>
                    <span class="compose-value">¥10,315.32</span>
                </div>
                <div class="compose-item">
                    <span class="compose-label">派费收入</span>
                    <span class="compose-value">¥593,621.11</span>
                </div>
                <div class="compose-item">
                    <span class="compose-label">中转费加收</span>
                    <span class="compose-value">¥622.60</span>
                </div>
                <div class="compose-item">
                    <span class="compose-label">政策收入</span>
                    <span class="compose-value">¥0.00</span>
                </div>
            </div>

            <div class="card">
                <div class="section-title">趋势分析</div>
                <div class="chart-box">
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">每日明细</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>收入 (元)</th>
                            <th>环比</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>01.30</td>
                            <td>1,450.00</td>
                            <td><span class="trend-badge trend-down">↓ -10%</span></td>
                        </tr>
                        <tr>
                            <td>01.29</td>
                            <td>1,620.00</td>
                            <td><span class="trend-badge trend-down">↓ -12%</span></td>
                        </tr>
                        <tr>
                            <td>01.28</td>
                            <td>1,850.00</td>
                            <td><span class="trend-badge trend-up">↑ +10%</span></td>
                        </tr>
                        <tr>
                            <td>01.27</td>
                            <td>1,680.00</td>
                            <td><span class="trend-badge trend-up">↑ +18%</span></td>
                        </tr>
                        <tr>
                            <td>01.26</td>
                            <td>1,420.00</td>
                            <td><span class="trend-badge trend-down">↓ -10%</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        
        if (type === 'expense') {
            document.getElementById('pageTitle').textContent = '本期支出详情';
            document.getElementById('mainLabel').textContent = '本期支出';
            document.getElementById('mainValue').textContent = '¥8,256.48';
            document.getElementById('trendBadge').textContent = '↑ 环比：+9%';
            const summaryBox = document.getElementById('summaryBox');
            summaryBox.className = 'summary-box expense';
        }

        const ctx = document.getElementById('trendChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['01.24', '01.25', '01.26', '01.27', '01.28', '01.29', '01.30'],
                datasets: [{
                    label: type === 'expense' ? '本期支出' : '本期收入',
                    data: type === 'expense' ? [980, 1120, 1050, 1280, 1420, 1180, 1080] : [1250, 1580, 1420, 1680, 1850, 1620, 1450],
                    borderColor: type === 'expense' ? '#ff6b6b' : '#2e7d32',
                    backgroundColor: type === 'expense' ? 'rgba(255, 107, 107, 0.1)' : 'rgba(46, 125, 50, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return '¥' + context.parsed.y.toLocaleString();
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        }
                    },
                    y: {
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        ticks: {
                            callback: function(value) {
                                return '¥' + value;
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
