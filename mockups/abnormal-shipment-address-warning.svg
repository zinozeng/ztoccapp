  <text x="1100" y="808" class="t k">当前登录角色</text>
  <text x="1240" y="808" class="t body">寄件网点</text>
  <text x="1100" y="848" class="t k">当前可见范围</text>
  <text x="1240" y="848" class="t body">寄件网点</text>
  <text x="1100" y="888" class="t k">当前可执行动作</text>
  <text x="1240" y="888" class="t body">确认</text>

  <text x="1072" y="960" class="t title">处理记录</text>
  <rect x="1072" y="990" width="408" height="36" rx="12" fill="#FFFBF3"/>
  <text x="1092" y="1013" class="t" style="font-size:13px;font-weight:500;fill:#8794A7">2026-03-03 12:15 系统触发地址预警</text>

  <rect x="80" y="1074" width="1440" height="86" rx="28" fill="#FFF" filter="url(#shadow4)"/>
  <rect x="1170" y="1091" width="150" height="52" rx="16" fill="#FFF" stroke="#D7DEE8"/>
  <text x="1228" y="1123" class="t btnw">取消</text>
  <rect x="1340" y="1091" width="140" height="52" rx="16" fill="#D97706"/>
  <text x="1392" y="1123" class="t btny">确认</text>
  <text x="124" y="1123" class="t body">确认型页面尽量收敛字段，优先突出预警原因与确认结果。</text>
</svg>
