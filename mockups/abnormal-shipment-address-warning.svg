  <line x1="1112" y1="410" x2="1440" y2="410" stroke="#EAB308" stroke-width="6" stroke-linecap="round"/>
  <circle cx="1112" cy="410" r="22" fill="#EAB308"/>
  <circle cx="1440" cy="410" r="22" fill="#EAB308"/>
  <text x="1080" y="462" class="t body">系统预警</text>
  <text x="1396" y="462" class="t body">寄件网点确认</text>

  <rect x="1072" y="520" width="408" height="160" rx="20" fill="#FEF3C7"/>
