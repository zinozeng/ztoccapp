  <text x="410" y="214" class="t" style="font-size:17px;font-weight:700;fill:#FFF">待寄件网点确认</text>

  <rect x="80" y="274" width="920" height="766" rx="28" fill="#FFF" filter="url(#shadow4)"/>
  <rect x="1032" y="274" width="488" height="766" rx="28" fill="#FFF" filter="url(#shadow4)"/>

  <text x="120" y="328" class="t title">运单基础信息</text>
