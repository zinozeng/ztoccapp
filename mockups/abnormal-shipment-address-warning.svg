  <text x="148" y="512" class="t body">杭州市余杭区五常街道文一西路 999 号 3 栋</text>

  <text x="120" y="586" class="t title">预警信息</text>
  <rect x="120" y="630" width="840" height="176" rx="18" fill="#FFFBF3"/>
  <text x="148" y="670" class="t k">系统预警内容</text>
  <text x="148" y="698" class="t v">收件地址疑似不完整</text>
  <text x="472" y="670" class="t k">触发时间</text>
