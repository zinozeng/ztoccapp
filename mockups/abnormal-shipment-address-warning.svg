<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBF3"/>
      <stop offset="1" stop-color="#FFF5E6"/>
    </linearGradient>
    <linearGradient id="hero4" x1="80" y1="84" x2="1520" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6B4A00"/>
      <stop offset="1" stop-color="#B7791F"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#CBB58F" flood-opacity="0.28"/>
    </filter>
    <style>
      .t{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
      .h1{font-size:34px;font-weight:700;fill:#FFF}
      .s1{font-size:15px;font-weight:500;fill:#F3E2A7}
      .title{font-size:22px;font-weight:700;fill:#203044}
      .sub{font-size:15px;font-weight:500;fill:#7B8AA0}
      .k{font-size:14px;font-weight:500;fill:#6B7A90}
      .v{font-size:18px;font-weight:700;fill:#203044}
      .body{font-size:15px;font-weight:500;fill:#324255}
      .chip{font-size:14px;font-weight:700;fill:#A16207}
      .btnw{font-size:18px;font-weight:700;fill:#324255}
      .btny{font-size:18px;font-weight:700;fill:#FFF}
    </style>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg4)"/>
  <rect x="80" y="84" width="1440" height="150" rx="28" fill="url(#hero4)" filter="url(#shadow4)"/>
