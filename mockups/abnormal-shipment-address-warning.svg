  <rect x="120" y="936" width="250" height="58" rx="16" fill="#FEF3C7" stroke="#F59E0B"/>
  <circle cx="154" cy="965" r="8" fill="#F59E0B"/>
  <text x="176" y="971" class="t body">地址无误</text>
  <rect x="390" y="936" width="250" height="58" rx="16" fill="#FFF" stroke="#D7DEE8"/>
  <circle cx="424" cy="965" r="8" fill="#D7DEE8"/>
