  <text x="420" y="900" class="t body">拒收凭证 2 份，可点击查看</text>
  <text x="150" y="946" class="t k">退货说明</text>
  <text x="150" y="974" class="t body">客户无法联系且已超约定时限，网点登记退回，仅保留查看和追踪能力。</text>

  <text x="1082" y="456" class="t title">流程状态</text>
  <line x1="1118" y1="532" x2="1446" y2="532" stroke="#E6ECF2" stroke-width="6" stroke-linecap="round"/>
  <line x1="1118" y1="532" x2="1446" y2="532" stroke="#C2410C" stroke-width="6" stroke-linecap="round"/>
  <circle cx="1118" cy="532" r="22" fill="#C2410C"/>
  <circle cx="1446" cy="532" r="22" fill="#C2410C"/>
  <text x="1086" y="584" class="t body">退货登记</text>
  <text x="1410" y="584" class="t body">仅查看</text>

  <rect x="1082" y="644" width="398" height="132" rx="20" fill="#FFF7ED"/>
  <text x="1110" y="684" class="t k">当前节点</text>
  <text x="1110" y="718" class="t" style="font-size:24px;font-weight:700;fill:#9A3412">退货登记完成</text>
  <text x="1110" y="750" class="t body">当前页面用于回看退货原因、附件和时间线，不开放编辑。</text>

  <text x="1082" y="834" class="t title">权限说明</text>
  <rect x="1082" y="862" width="398" height="126" rx="20" fill="#F8FAFC"/>
  <text x="1110" y="902" class="t k">当前登录角色</text>
  <text x="1244" y="902" class="t body">发起退货网点</text>
  <text x="1110" y="942" class="t k">当前可执行动作</text>
  <text x="1244" y="942" class="t body">仅查看</text>

  <rect x="80" y="1074" width="1440" height="86" rx="28" fill="#FFF" filter="url(#shadow2)"/>
