  <text x="360" y="214" class="t s1">当前状态</text>
  <text x="440" y="214" class="t" style="font-size:17px;font-weight:700;fill:#FFF">退货登记完成</text>
  <text x="650" y="214" class="t s1">可见范围</text>
  <text x="730" y="214" class="t" style="font-size:17px;font-weight:700;fill:#FFF">发起退货网点</text>

  <rect x="80" y="274" width="1440" height="94" rx="24" fill="#FFF7ED" filter="url(#shadow2)"/>
  <text x="120" y="324" class="t" style="font-size:18px;font-weight:700;fill:#9A3412">该异常类型仅发起退货网点可查看，不支持修改。</text>

  <rect x="80" y="402" width="930" height="638" rx="28" fill="#FFF" filter="url(#shadow2)"/>
  <rect x="1042" y="402" width="478" height="638" rx="28" fill="#FFF" filter="url(#shadow2)"/>

  <text x="120" y="456" class="t title">运单基础信息</text>
