  <rect x="120" y="512" width="850" height="150" rx="18" fill="#F8FAFC"/>
  <text x="150" y="552" class="t k">运单号</text>
  <text x="150" y="580" class="t v">ZT202603030002</text>
  <text x="410" y="552" class="t k">客户名称</text>
  <text x="410" y="580" class="t v">XX 食品有限公司</text>
  <text x="700" y="552" class="t k">当前状态</text>
  <text x="700" y="580" class="t v">退货处理中</text>
