  <rect x="120" y="752" width="850" height="248" rx="18" fill="#F8FAFC"/>
  <text x="150" y="792" class="t k">退货发起网点</text>
  <text x="150" y="820" class="t v">上海寄件网点</text>
  <text x="420" y="792" class="t k">登记人</text>
  <text x="420" y="820" class="t v">张三</text>
  <text x="640" y="792" class="t k">登记时间</text>
  <text x="640" y="820" class="t v">2026-03-03 09:40</text>
  <text x="150" y="872" class="t k">退货原因</text>
  <text x="150" y="900" class="t v">客户拒收</text>
