<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="hero2" x1="80" y1="84" x2="1520" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5A3420"/>
      <stop offset="1" stop-color="#8A4C22"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#A7B6C8" flood-opacity="0.25"/>
    </filter>
    <style>
      .t{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
      .h1{font-size:34px;font-weight:700;fill:#FFF}
      .s1{font-size:15px;font-weight:500;fill:#E7D9CD}
      .title{font-size:22px;font-weight:700;fill:#203044}
      .sub{font-size:15px;font-weight:500;fill:#7B8AA0}
      .k{font-size:14px;font-weight:500;fill:#6B7A90}
      .v{font-size:18px;font-weight:700;fill:#203044}
      .body{font-size:15px;font-weight:500;fill:#324255}
      .small{font-size:13px;font-weight:500;fill:#8794A7}
      .chip{font-size:14px;font-weight:700;fill:#9A3412}
      .btn{font-size:18px;font-weight:700;fill:#324255}
    </style>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg2)"/>
  <rect x="80" y="84" width="1440" height="150" rx="28" fill="url(#hero2)" filter="url(#shadow2)"/>
  <text x="124" y="138" class="t h1">异常运单详情</text>
  <text x="124" y="173" class="t s1">运单管理 / 异常运单 / 退货查看</text>
  <rect x="124" y="190" width="160" height="44" rx="22" fill="#FFEDD5"/>
