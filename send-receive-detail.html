<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发派详情</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .mobile-container {
            max-width: 414px;
            margin: 0 auto;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #333;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
        }

        .back-btn:active {
            opacity: 0.6;
        }

        .header-title {
            color: #333;
            font-size: 17px;
            font-weight: 600;
            flex: 1;
        }

        .main-content {
            padding: 16px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        .summary-box {
            background: linear-gradient(135deg, #f8f9ff 0%, #e8f0ff 100%);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        .summary-value {
            font-size: 32px;
            font-weight: 700;
            color: #0066cc;
        }

        .summary-label {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        .trend-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }

        .trend-up {
            background: #ffe6e6;
            color: #ff4d4f;
        }

        .trend-down {
            background: #e6f7e6;
            color: #52c41a;
        }

        .chart-box {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .chart-container {
            position: relative;
            height: 180px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .data-table th {
            background: #f5f7fa;
            padding: 10px 6px;
            text-align: left;
            color: #666;
            font-weight: 600;
        }

        .data-table td {
            padding: 12px 6px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab {
            padding: 8px 16px;
            background: #f5f7fa;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab.active {
            background: #0066cc;
            color: #fff;
        }

        .tab:active {
            opacity: 0.7;
        }

        @media (max-width: 375px) {
            .summary-value {
                font-size: 28px;
            }
            
            .chart-container {
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <div class="header-top">
                <button class="back-btn" onclick="history.back()">‹</button>
                <h1 class="header-title" id="pageTitle">发件重量详情</h1>
            </div>
        </header>

        <main class="main-content">
            <div class="card">
                <div class="summary-box">
                    <div class="summary-value" id="mainValue">70,180.68 KG</div>
                    <div class="summary-label" id="mainLabel">发件重量</div>
                    <span class="trend-badge trend-up" id="trendBadge">↑ 月环比：+13%</span>
                </div>
            </div>

            <div class="card">
                <div class="section-title">趋势分析</div>
                <div class="chart-box">
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">产品类型分布</div>
                <div class="tabs">
                    <div class="tab active">全部</div>
                    <div class="tab">零担</div>
                    <div class="tab">冷链快递</div>
                    <div class="tab">冷链小件</div>
                    <div class="tab">鲸确达 - 零担</div>
                    <div class="tab">鲸确达 - 小件</div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">明细数据</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>产品类型</th>
                            <th>重量 (KG)</th>
                            <th>票数</th>
                            <th>环比</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>01.30</td>
                            <td>零担</td>
                            <td>25,230.5</td>
                            <td>856</td>
                            <td><span class="trend-badge trend-up">↑ +15%</span></td>
                        </tr>
                        <tr>
                            <td>01.30</td>
                            <td>冷链快递</td>
                            <td>18,450.8</td>
                            <td>623</td>
                            <td><span class="trend-badge trend-up">↑ +12%</span></td>
                        </tr>
                        <tr>
                            <td>01.30</td>
                            <td>冷链小件</td>
                            <td>12,680.2</td>
                            <td>445</td>
                            <td><span class="trend-badge trend-up">↑ +8%</span></td>
                        </tr>
                        <tr>
                            <td>01.30</td>
                            <td>鲸确达 - 零担</td>
                            <td>8,560.4</td>
                            <td>298</td>
                            <td><span class="trend-badge trend-down">↓ -3%</span></td>
                        </tr>
                        <tr>
                            <td>01.30</td>
                            <td>鲸确达 - 小件</td>
                            <td>5,258.78</td>
                            <td>187</td>
                            <td><span class="trend-badge trend-up">↑ +5%</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        
        const config = {
            'send-weight': {
                title: '发件重量详情',
                label: '发件重量',
                value: '70,180.68 KG',
                trend: '↑ 月环比：+13%',
                trendClass: 'trend-up',
                chartData: [65230, 68450, 67800, 69200, 70180, 71500, 70180]
            },
            'send-count': {
                title: '发件票数详情',
                label: '发件票数',
                value: '1,410 票',
                trend: '↑ 月环比：+15%',
                trendClass: 'trend-up',
                chartData: [1280, 1320, 1350, 1380, 1410, 1450, 1410]
            },
            'receive-weight': {
                title: '派件重量详情',
                label: '派件重量',
                value: '172,805.77 KG',
                trend: '↓ 月环比：-13%',
                trendClass: 'trend-down',
                chartData: [185000, 182000, 178000, 175000, 172805, 170000, 172805]
            },
            'receive-count': {
                title: '派件票数详情',
                label: '派件票数',
                value: '3,445 票',
                trend: '↓ 月环比：-2%',
                trendClass: 'trend-down',
                chartData: [3520, 3480, 3460, 3450, 3445, 3420, 3445]
            }
        };

        const currentConfig = config[type] || config['send-weight'];
        
        document.getElementById('pageTitle').textContent = currentConfig.title;
        document.getElementById('mainLabel').textContent = currentConfig.label;
        document.getElementById('mainValue').textContent = currentConfig.value;
        const trendBadge = document.getElementById('trendBadge');
        trendBadge.textContent = currentConfig.trend;
        trendBadge.className = 'trend-badge ' + currentConfig.trendClass;

        const ctx = document.getElementById('trendChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['01.24', '01.25', '01.26', '01.27', '01.28', '01.29', '01.30'],
                datasets: [{
                    label: currentConfig.label,
                    data: currentConfig.chartData,
                    borderColor: '#0066cc',
                    backgroundColor: 'rgba(0, 102, 204, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y.toLocaleString();
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        }
                    },
                    y: {
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        }
                    }
                }
            }
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });
    </script>
</body>
</html>
